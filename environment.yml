name: ssi
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - scipy
  - scikit-learn
  - pandas
  - pyserial
  - matplotlib
  - jupyter
  - pip
  - pip:
      - pyqtgraph
      - neurokit2
      # Dev tools — linter, formatter, type checker, pre-commit, tests
      - ruff
      - black
      - mypy
      - pre-commit
      - pytest
      - pytest-cov
      - nbstripout
